name: weekly-pulse

# Runs the pulse for every product in the registry once a week.
# Schedule: Monday 00:30 UTC == Monday 06:00 IST.
on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PULSE_ENV: prod
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PULSE_DOC_ID_GROWW: ${{ secrets.PULSE_DOC_ID_GROWW }}
      GOOGLE_DOCS_ENABLED: "true"
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restore audit DB
        uses: actions/cache@v4
        with:
          path: .pulse/audit.db
          key: pulse-audit-${{ github.ref }}
          restore-keys: |
            pulse-audit-

      - name: Run weekly pipeline
        run: python -m pulse.scheduler.weekly --config config/pulse.yaml

      - name: Persist audit DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-audit-${{ github.run_id }}
          path: .pulse/audit.db
          retention-days: 90

      - name: Persist run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-runs-${{ github.run_id }}
          path: .pulse/runs/
          retention-days: 30
