name: weekly-pulse

# Runs every Monday 06:00 IST (00:30 UTC).
# POSTs to /api/trigger on the Render dashboard so the pipeline runs
# on the web service, which has the persistent disk mounted.
on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Wake up Render service and trigger pipeline
        run: |
          echo "Triggering pulse run on Render..."
          curl -sf -X POST "${{ secrets.RENDER_DASHBOARD_URL }}/api/trigger" \
            -H "Content-Type: application/json" \
            -d '{"product": "groww"}'

      - name: Wait for pipeline to complete
        run: |
          echo "Polling for completion (max 80 min)..."
          for i in $(seq 1 48); do
            sleep 100
            STATE=$(curl -sf "${{ secrets.RENDER_DASHBOARD_URL }}/api/latest?product=groww" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('trigger_state',''))" 2>/dev/null || echo "unknown")
            echo "  attempt $i — trigger_state=$STATE"
            if [ "$STATE" != "running" ]; then
              echo "Pipeline finished with state: $STATE"
              exit 0
            fi
          done
          echo "Timed out waiting for pipeline to finish"
          exit 1
